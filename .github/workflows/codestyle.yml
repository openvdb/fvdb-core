name: fVDB Code Style
on:
    pull_request:
      branches:
        - '**'

# Allow subsequent pushes to the same PR or REF to cancel any previous jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-python-black-lint:
    name: Python code style (black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e # stable
        with:
          options: "--check --diff --verbose"
          src: "./"
          version: "~= 24.0"

  test-cpp-clang-format-lint:
    name: C++ code style (clang-format)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: DoozyX/clang-format-lint-action@bcb4eb2cb0d707ee4f3e5cc3b456eb075f12cf73 # v0.20
      with:
        source: 'src/'
        extensions: 'h,cpp,cc,cu,cuh'
        clangFormatVersion: 18
        style: file

  include-guards:
    name: Include guards
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: swahtz/include-guards-check-action@41d1997205f936c50e23272c849398168b72083a # master
      with:
        path: 'src/'

  check-spdx-identifiers:
    name: SPDX identifiers
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: enarx/spdx@d4020ee98e3101dd487c5184f27c6a6fb4f88709 # master
      with:
        licenses: |-
          Apache-2.0

  # Search the git repository for any trailing spaces excluding auto-generated wlt files
  # NOTE: Migrated from openvdb whitespace.yml
  trailingspaces:
    name: Trailing spaces
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: test
      run: |
          set +e
          git grep -n -I -E '^.+[ ]+$' -- ':!*.wlt' ':!*/wip/*'
          test $? -eq 1

  # Search for any tabs excluding meeting notes, image files and a few others
  # NOTE: Migrated from openvdb whitespace.yml
  spacesnottabs:
    name: Spaces not tabs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: test
      run: |
          set +e
          git grep -n "	" -- ':!*/codestyle.yml' ':!*.svg' ':!*.webp' ':!*.cmd' ':!*.png' ':!*.wlt' ':!*.jpg' ':!*.gif' ':!*.mp4' ':!*.pt' ':!*.pth' ':!*.nvdb' ':!*.npz' ':!*.gitmodules' ':!*/wip/*'
          test $? -eq 1
