name: Publish fVDB Pip Package

on:
  release:
    types: [published]
  push:
    branches:
      - 'release/v[0-9]*'
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"
      publish_target:
        description: "Publish target: testpypi | s3 | release | none"
        required: false
        default: "testpypi"
      run_validation:
        description: "Run GPU validation tests on built wheel"
        required: false
        type: boolean
        default: false

# Allow subsequent pushes to the same PR or REF to cancel any previous jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: read
  pull-requests: read
  issues: read

jobs:
  pr-flags:
    name: Determine publish flags
    runs-on: ubuntu-latest
    outputs:
      s3: ${{ steps.flags.outputs.s3 }}
      pypi: ${{ steps.flags.outputs.pypi }}
      release: ${{ steps.flags.outputs.release }}
      release_push: ${{ steps.flags.outputs.release_push }}
      test_python_version: ${{ steps.test-env.outputs.python_version }}
      test_torch_version: ${{ steps.test-env.outputs.torch_version }}
      test_cuda_version: ${{ steps.test-env.outputs.cuda_version }}
      test_cuda_image_tag: ${{ steps.test-env.outputs.cuda_image_tag }}
    steps:
      - name: Compute publish routing flags
        id: flags
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PUBLISH_TARGET: ${{ inputs.publish_target }}
        with:
          script: |
            const isPR = context.eventName === 'pull_request';
            const isPush = context.eventName === 'push';
            const isRelease = context.eventName === 'release';
            const isDispatch = context.eventName === 'workflow_dispatch';
            const publishTarget = process.env.PUBLISH_TARGET || '';
            let s3 = publishTarget === 's3';
            let pypi = isDispatch && publishTarget === 'testpypi';
            let releasePush = false;
            let release = false;
            if (isPR) {
              const {owner, repo} = context.repo;
              const sha = context.payload.pull_request.head.sha;
              const commit = await github.rest.repos.getCommit({ owner, repo, ref: sha });
              const msg = (commit.data.commit.message || '').toString();
              s3 = /\[s3\]/i.test(msg);
            } else if (isPush) {
              s3 = true;
              releasePush = true;
            } else if (isRelease) {
              s3 = true;
              pypi = true;
              release = true;
            } else if (isDispatch && publishTarget === 'release') {
              s3 = true;
              pypi = true;
              release = true;
            }
            core.setOutput('s3', s3 ? 'true' : 'false');
            core.setOutput('pypi', pypi ? 'true' : 'false');
            core.setOutput('release', release ? 'true' : 'false');
            core.setOutput('release_push', releasePush ? 'true' : 'false');
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: env/test_environment.yml
          sparse-checkout-cone-mode: false
          ref: ${{ inputs.branch || github.ref }}
          persist-credentials: false
      - name: Parse test environment versions
        id: test-env
        run: |
          PY_VER=$(grep -oP '^\s*-\s*python=\K[0-9]+\.[0-9]+' env/test_environment.yml)
          TORCH_VER=$(grep -oP '^\s*-\s*pytorch-gpu=\K[0-9]+\.[0-9]+' env/test_environment.yml)
          CUDA_VER=$(grep -oP '^\s*-\s*cuda-version=\K[0-9]+\.[0-9]+' env/test_environment.yml)
          case "$CUDA_VER" in
            11.8) CUDA_IMAGE_TAG="11.8.0" ;;
            12.1) CUDA_IMAGE_TAG="12.1.1" ;;
            12.4) CUDA_IMAGE_TAG="12.4.1" ;;
            12.8) CUDA_IMAGE_TAG="12.8.1" ;;
            13.0) CUDA_IMAGE_TAG="13.0.2" ;;
            *)    echo "WARNING: Unknown CUDA version $CUDA_VER" >&2; CUDA_IMAGE_TAG="${CUDA_VER}.0" ;;
          esac
          echo "python_version=$PY_VER" >> $GITHUB_OUTPUT
          echo "torch_version=$TORCH_VER" >> $GITHUB_OUTPUT
          echo "cuda_version=$CUDA_VER" >> $GITHUB_OUTPUT
          echo "cuda_image_tag=$CUDA_IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Test env: python=$PY_VER torch=$TORCH_VER cuda=$CUDA_VER image=$CUDA_IMAGE_TAG"

  versions:
    uses: ./.github/workflows/load-versions.yml
    with:
      ref: ${{ inputs.branch || '' }}

  start-build-runner:
    name: Start CPU-only EC2 runner for build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for AWS OIDC
    needs: versions
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.versions.outputs.publish-matrix) }}
    steps:
      - name: Stagger job starts to avoid API rate limits
        run: |
          # Random delay between 0 and 15 seconds to stagger runner registrations
          DELAY=$((RANDOM % 16))
          echo "Delaying start by ${DELAY} seconds for Python ${MATRIX_PYTHON_VERSION}"
          sleep $DELAY
        env:
          MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ needs.versions.outputs.aws-role }}
          aws-region: ${{ needs.versions.outputs.aws-region }}
      - name: Start EC2 runner
        id: start-build-runner
        uses: machulav/ec2-github-runner@343a1b2ae682e681c3cec9a235d882da17ff04ef # v2.6.1
        with:
          mode: start
          github-token: ${{ secrets.EC2_RUNNER_TOKEN }}
          ec2-image-id: ${{ needs.versions.outputs.aws-cpu-ami }}
          ec2-instance-type: m6a.8xlarge
          subnet-id: ${{ needs.versions.outputs.aws-subnet }}
          security-group-id: ${{ needs.versions.outputs.aws-security-group }}
          label: ec2-${{ matrix.python-version }}-pt${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}-${{ github.run_id }}
          aws-resource-tags: >
            [
              {"Key": "RunnerLabel", "Value": "ec2-${{ matrix.python-version }}-pt${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}-${{ github.run_id }}"},
              {"Key": "PythonVersion", "Value": "${{ matrix.python-version }}"},
              {"Key": "TorchVersion", "Value": "${{ matrix.torch-version }}"},
              {"Key": "CudaVersion", "Value": "${{ matrix.cuda-version }}"},
              {"Key": "GitHubRunId", "Value": "${{ github.run_id }}"}
            ]

  fvdb-build:
    name: fVDB Build
    needs: [start-build-runner, pr-flags, versions] # start when runner is ready and flags computed
    runs-on: ec2-${{ matrix.python-version }}-pt${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}-${{ github.run_id }} # run the job on the newly created runner
    container:
      image: nvidia/cuda:${{ matrix.cuda-image-tag }}-cudnn-devel-rockylinux8
      env:
        PYTHONPATH: ""
        CPM_SOURCE_CACHE: "/__w/cpm_cache"
        FORCE_CUDA: 1
      options: --rm
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.versions.outputs.publish-matrix) }}
    steps:
      - name: Install prerequisites
        run: |
          dnf install -y git wget procps-ng findutils gcc-toolset-${NEEDS_VERSIONS_OUTPUTS_GCC_TOOLSET}
          echo 'source /opt/rh/gcc-toolset-${NEEDS_VERSIONS_OUTPUTS_GCC_TOOLSET}/enable' > /etc/profile.d/gcc-toolset-${NEEDS_VERSIONS_OUTPUTS_GCC_TOOLSET}.sh
        env:
          NEEDS_VERSIONS_OUTPUTS_GCC_TOOLSET: ${{ needs.versions.outputs.gcc-toolset }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Fetch all history for all branches
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.ref || inputs.branch || github.ref }}
          persist-credentials: false

      - name: Fetch PR branch
        if: github.event_name == 'pull_request_target'
        run: |
          cd $GITHUB_WORKSPACE
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$(pwd)"
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr_branch

      - name: Merge PR branch into base
        if: github.event_name == 'pull_request_target'
        run: |
          cd $GITHUB_WORKSPACE
          git merge pr_branch

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          version: "${{ needs.versions.outputs.uv-version }}"
          enable-cache: false

      - name: Set up Python
        run: |
          uv python install ${MATRIX_PYTHON_VERSION}
          uv venv
        env:
          MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Install CMake
        run: >
          wget -nv https://github.com/Kitware/CMake/releases/download/v${NEEDS_VERSIONS_OUTPUTS_CMAKE_VERSION}/cmake-${NEEDS_VERSIONS_OUTPUTS_CMAKE_VERSION}-linux-x86_64.sh &&
          mkdir /opt/cmake &&
          sh cmake-${NEEDS_VERSIONS_OUTPUTS_CMAKE_VERSION}-linux-x86_64.sh --prefix=/usr/local --skip-license &&
          cmake --version
        env:
          NEEDS_VERSIONS_OUTPUTS_CMAKE_VERSION: ${{ needs.versions.outputs.cmake-version }}

      - name: Install system dependencies
        run: dnf install -y zlib-devel libpng-devel pkgconfig unzip procps-ng findutils

      - name: Install pip dependencies
        run: |
          # Convert CUDA version from 12.8 to cu128 format for PyTorch index
          CUDA_TAG="cu$(echo "${MATRIX_CUDA_VERSION}" | tr -d '.')"
          TORCH_VERSION="${MATRIX_TORCH_VERSION}"
          echo "Installing PyTorch ${TORCH_VERSION} for ${CUDA_TAG}"
          # Pin the tested PyTorch via a constraints file so the unbounded torch in
          # build_requirements.txt resolves to the version recorded in versions.json.
          echo "torch==${NEEDS_VERSIONS_OUTPUTS_TORCH_FULL_VERSION}" > "${RUNNER_TEMP}/torch-constraints.txt"
          uv pip install --no-cache -c "${RUNNER_TEMP}/torch-constraints.txt" -r env/build_requirements.txt --extra-index-url https://download.pytorch.org/whl/${CUDA_TAG}
        env:
          MATRIX_CUDA_VERSION: ${{ matrix.cuda-version }}
          MATRIX_TORCH_VERSION: ${{ matrix.torch-version }}
          NEEDS_VERSIONS_OUTPUTS_TORCH_FULL_VERSION: ${{ needs.versions.outputs.torch-full-version }}

      - name: Add a post-release to version (used for testing on TestPyPI)
        if: ${{ needs.pr-flags.outputs.s3 == 'false' }}
        run: |
          VERSION_LINE=$(grep '^version *= *"' pyproject.toml)
          VERSION=$(echo "$VERSION_LINE" | sed -E 's/^version *= *"([^"]+)".*/\1/')
          if [ "${GITHUB_RUN_NUMBER:-${{ github.run_number }}}" -gt 1 ]; then
            NEW_VERSION="${VERSION}.post${GITHUB_RUN_NUMBER:-${{ github.run_number }}}"
            sed -i -E "s/^version *= *\"[^\"]+\"/version = \"${NEW_VERSION}\"/" pyproject.toml
            echo "Updated version to $NEW_VERSION"
          else
            echo "Version unchanged: $VERSION"
          fi
          grep '^version' pyproject.toml

      - name: Add local version for S3 publish
        if: ${{ needs.pr-flags.outputs.s3 == 'true' }}
        run: |
          TORCH_TAG="$(echo "${MATRIX_TORCH_VERSION}" | tr -d '.')"
          CUDA_TAG="$(echo "${MATRIX_CUDA_VERSION}" | tr -d '.')"
          sed -i -E 's/^version\s*=\s*"([^"]+)"/version = "\1+pt'"${TORCH_TAG}"'.cu'"${CUDA_TAG}"'"/' pyproject.toml
          grep '^version' pyproject.toml
        env:
          MATRIX_TORCH_VERSION: ${{ matrix.torch-version }}
          MATRIX_CUDA_VERSION: ${{ matrix.cuda-version }}

      - name: Build fvdb
        run: |
          source .venv/bin/activate
          ./build.sh wheel strip_symbols verbose --cuda-arch-list '${NEEDS_VERSIONS_OUTPUTS_CUDA_ARCH_PUBLISH}'
        env:
          NEEDS_VERSIONS_OUTPUTS_CUDA_ARCH_PUBLISH: ${{ needs.versions.outputs.cuda-arch-publish }}

      - name: Repair wheel for manylinux
        if: ${{ needs.pr-flags.outputs.s3 != 'true' || needs.pr-flags.outputs.release_push == 'true' || needs.pr-flags.outputs.release == 'true' }}
        run: |
          source .venv/bin/activate
          uv pip install auditwheel patchelf
          # Check glibc version
          ldd --version | head -n1
          CUDA_MAJOR=$(echo "${MATRIX_CUDA_VERSION}" | cut -d. -f1)
          # Exclude CUDA, PyTorch, and other system libraries to keep wheel size down
          auditwheel repair dist/fvdb_core-*.whl -w dist/ \
            --exclude libcuda.so.1 \
            --exclude libcudart.so.${CUDA_MAJOR} \
            --exclude libcufile.so.1 \
            --exclude libnvrtc.so.${CUDA_MAJOR} \
            --exclude libnvToolsExt.so.1 \
            --exclude libcublas.so.${CUDA_MAJOR} \
            --exclude libcublasLt.so.${CUDA_MAJOR} \
            --exclude libcudnn.so.9 \
            --exclude libcufft.so.11 \
            --exclude libcurand.so.10 \
            --exclude libcusolver.so.11 \
            --exclude libcusparse.so.${CUDA_MAJOR} \
            --exclude libnvJitLink.so.${CUDA_MAJOR} \
            --exclude libtorch.so \
            --exclude libtorch_cpu.so \
            --exclude libtorch_cuda.so \
            --exclude libtorch_python.so \
            --exclude libc10.so \
            --exclude libc10_cuda.so \
            --exclude libmkl_core.so.2 \
            --exclude libmkl_intel_lp64.so.2 \
            --exclude libmkl_intel_thread.so.2 \
            --exclude libomp.so \
            --exclude libprotobuf.so.31 \
            || echo "auditwheel failed, keeping original wheel"
          # Remove original linux_x86_64 wheel if repair succeeded
          if ls dist/fvdb_core-*-manylinux*.whl 1> /dev/null 2>&1; then
            rm dist/fvdb_core-*-linux_x86_64.whl
          fi
          # Show wheel sizes and verify compression
          ls -lh dist/
          echo "Wheel contents (full list):"
          unzip -l dist/fvdb_core-*.whl
          echo ""
          echo "Largest files in wheel:"
          unzip -l dist/fvdb_core-*.whl | sort -k1 -n -r | head -30
        env:
          MATRIX_CUDA_VERSION: ${{ matrix.cuda-version }}

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fvdb-publish-package-${{ matrix.python-version }}-torch${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}
          path: dist/fvdb_core-*.whl
          retention-days: 2

  publish-dist:
    name: Publish source distribution to PyPI/TestPyPI
    needs:
      - pr-flags
      - fvdb-build
      - versions
    if: ${{ !cancelled() && needs.fvdb-build.result == 'success' && needs.pr-flags.outputs.pypi == 'true' }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ (needs.pr-flags.outputs.release == 'true' && 'pypi') || 'testpypi' }}
      url: ${{ (needs.pr-flags.outputs.release == 'true' && 'https://pypi.org/p/fvdb-core') || 'https://test.pypi.org/p/fvdb-core' }}

    permissions:
      contents: read
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch || github.ref }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '${{ needs.versions.outputs.python-default }}'
      - name: Add post-release to version (TestPyPI only)
        if: ${{ needs.pr-flags.outputs.release != 'true' }}
        run: |
          VERSION_LINE=$(grep '^version *= *"' pyproject.toml)
          VERSION=$(echo "$VERSION_LINE" | sed -E 's/^version *= *"([^"]+)".*/\1/')
          if [ "${GITHUB_RUN_NUMBER:-${{ github.run_number }}}" -gt 1 ]; then
            NEW_VERSION="${VERSION}.post${GITHUB_RUN_NUMBER:-${{ github.run_number }}}"
            sed -i -E "s/^version *= *\"[^\"]+\"/version = \"${NEW_VERSION}\"/" pyproject.toml
            echo "Updated version to $NEW_VERSION"
          else
            echo "Version unchanged: $VERSION"
          fi
          grep '^version' pyproject.toml
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist
          echo "Built sdist:"
          ls -lh dist/
      - name: Publish distribution
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: ${{ (needs.pr-flags.outputs.release == 'true' && 'https://upload.pypi.org/legacy/') || 'https://test.pypi.org/legacy/' }}
          verbose: true

  publish-to-s3:
    name: Publish wheels to custom S3 Simple Index
    needs: [pr-flags, fvdb-build, versions]
    if: ${{ !cancelled() && needs.pr-flags.outputs.s3 == 'true' && needs.fvdb-build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for AWS OIDC
    env:
      S3_BUCKET: fvdb-packages
      SIMPLE_PREFIX: ${{ needs.pr-flags.outputs.release == 'true' && 'simple' || 'simple-staging' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ needs.versions.outputs.aws-role }}
          aws-region: ${{ needs.versions.outputs.aws-region }}

      - name: Download all built wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: fvdb-publish-package-*
          path: dist
          merge-multiple: true

      - name: Determine normalized project name from wheel
        id: proj
        run: |
          set -euo pipefail
          shopt -s nullglob
          FIRST_WHL=$(ls dist/*.whl | head -n1)
          if [ -z "${FIRST_WHL:-}" ]; then
            echo "No wheels found in dist/" >&2; exit 1
          fi
          BASE=$(basename "$FIRST_WHL")
          PROJECT=${BASE%%-*}
          NORM=$(echo "$PROJECT" | tr '[:upper:]' '[:lower:]' | sed -E 's/[-_.]+/-/g')
          echo "project_name=$PROJECT" >> $GITHUB_OUTPUT
          echo "normalized=$NORM" >> $GITHUB_OUTPUT
          echo "Project: $PROJECT, Normalized: $NORM"

      - name: Prune staging wheels older than 30 days
        if: ${{ env.SIMPLE_PREFIX == 'simple-staging' }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '30 days ago' '+%Y-%m-%d')
          echo "Pruning staging wheels uploaded before $CUTOFF"
          LISTING=$(aws s3 ls "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${STEPS_PROJ_OUTPUTS_NORMALIZED}/" 2>/dev/null || true)
          if [ -z "$LISTING" ]; then
            echo "No existing wheels found -- nothing to prune"
            exit 0
          fi
          DELETED=0
          while read -r line; do
            DATE_PART=$(echo "$line" | awk '{print $1}')
            FILE_PART=$(echo "$line" | awk '{print $4}')
            if [[ "$FILE_PART" == *.whl ]] && [[ "$DATE_PART" < "$CUTOFF" ]]; then
              echo "Removing: $FILE_PART (uploaded $DATE_PART)"
              aws s3 rm "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${STEPS_PROJ_OUTPUTS_NORMALIZED}/$FILE_PART" --only-show-errors
              DELETED=$((DELETED + 1))
            fi
          done <<< "$LISTING"
          echo "Pruned $DELETED old staging wheel(s)"
        env:
          STEPS_PROJ_OUTPUTS_NORMALIZED: ${{ steps.proj.outputs.normalized }}

      - name: Upload wheels to S3 project directory
        run: |
          set -euo pipefail
          DEST="s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${STEPS_PROJ_OUTPUTS_NORMALIZED}"
          # Ensure trailing slash exactly once
          DEST="${DEST%/}/"
          echo "Uploading wheels to $DEST"
          shopt -s nullglob
          upload_failed=0
          for whl in dist/*.whl; do
            echo "Uploading $whl"
            if aws s3 cp "$whl" "$DEST"; then
              echo "✓ Successfully uploaded $whl"
            else
              echo "✗ FAILED to upload $whl"
              upload_failed=1
            fi
          done
          if [ $upload_failed -eq 1 ]; then
            echo "ERROR: One or more wheel uploads failed"
            exit 1
          fi
          echo "All wheels uploaded successfully"

          # Brief delay to ensure S3 consistency for subsequent listing
          echo "Waiting 2 seconds for S3 consistency..."
          sleep 2
        env:
          STEPS_PROJ_OUTPUTS_NORMALIZED: ${{ steps.proj.outputs.normalized }}

      - name: Generate project index.html
        run: |
          set -euo pipefail
          OUTDIR="dist/index-gen/${STEPS_PROJ_OUTPUTS_NORMALIZED}"
          mkdir -p "$OUTDIR"
          INDEX_FILE="$OUTDIR/index.html"
          TITLE="Links for ${STEPS_PROJ_OUTPUTS_PROJECT_NAME}"
          # List wheels from S3 to ensure index matches what's actually uploaded and previous versions
          # Use grep -E and || true to handle case where no wheels exist yet, then extract filename (field 4)
          wheels=$(aws s3 ls "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${STEPS_PROJ_OUTPUTS_NORMALIZED}/" | { grep -E '\.whl$' || true; } | awk '{print $4}')

          echo "Found wheels in S3:"
          echo "$wheels"

          if [ -z "$wheels" ]; then
            echo "WARNING: No wheels found in S3 at s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${STEPS_PROJ_OUTPUTS_NORMALIZED}/"
            echo "This may indicate an upload failure or timing issue"
          fi

          {
            echo "<!DOCTYPE html>";
            echo "<html><head><meta charset=\"utf-8\"><title>${TITLE}</title></head><body>";
            echo "<h1>${TITLE}</h1>";
            wheel_count=0
            for whl in $wheels; do
              wheel_count=$((wheel_count + 1))
              echo "Processing wheel ${wheel_count}: $whl" >&2
              # Get SHA256 from S3 ETag or compute from local file if available
              if [ -f "dist/$whl" ]; then
                sha=$(sha256sum "dist/$whl" | awk '{print $1}')
                echo "  ✓ Computed SHA256 from local file: ${sha:0:16}..." >&2
              else
                # Download temporarily to compute hash
                echo "  → Downloading $whl to compute hash..." >&2
                if aws s3 cp "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${STEPS_PROJ_OUTPUTS_NORMALIZED}/$whl" "/tmp/$whl" --only-show-errors; then
                  sha=$(sha256sum "/tmp/$whl" | awk '{print $1}')
                  rm "/tmp/$whl"
                  echo "  ✓ Computed SHA256 from S3 file: ${sha:0:16}..." >&2
                else
                  echo "  ✗ ERROR: Failed to download $whl from S3" >&2
                  exit 1
                fi
              fi
              href_whl="${whl//+/%2B}"
              html_line="<a href=\"${href_whl}#sha256=${sha}\">${whl}</a><br/>"
              echo "  Adding HTML: $html_line" >&2
              echo "$html_line";
            done;
            echo "</body></html>";
          } > "$INDEX_FILE"

          echo ""
          echo "Total wheels processed: $wheel_count"

          echo "Generated index.html:"
          cat "$INDEX_FILE"

          echo "Uploading index.html to S3..."
          aws s3 cp "$INDEX_FILE" "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${STEPS_PROJ_OUTPUTS_NORMALIZED}/index.html" \
            --content-type text/html \
            --cache-control "public, max-age=60, must-revalidate" \
            --only-show-errors
          echo "Index uploaded successfully"
        env:
          STEPS_PROJ_OUTPUTS_NORMALIZED: ${{ steps.proj.outputs.normalized }}
          STEPS_PROJ_OUTPUTS_PROJECT_NAME: ${{ steps.proj.outputs.project_name }}

      - name: Generate root simple index.html
        run: |
          set -euo pipefail
          TMPDIR=$(mktemp -d)
          ROOT_INDEX="$TMPDIR/index.html"
          echo "Building root simple index from s3://${S3_BUCKET}/${SIMPLE_PREFIX}/"
          # List existing project prefixes
          projects=$(aws s3 ls "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/" | awk '{print $2}' | sed 's:/$::')
          TITLE="Simple index"
          {
            echo "<!DOCTYPE html>";
            echo "<html><head><meta charset=\"utf-8\"><title>${TITLE}</title></head><body>";
            echo "<h1>${TITLE}</h1>";
            for p in $projects; do
              echo "<a href=\"${p}/\">${p}</a><br/>";
            done;
            echo "</body></html>";
          } > "$ROOT_INDEX"
          aws s3 cp "$ROOT_INDEX" "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/index.html" \
            --content-type text/html \
            --cache-control "public, max-age=60, must-revalidate" \
            --only-show-errors

      - name: Invalidate CloudFront cache for simple-index paths
        run: |
          set -euo pipefail
          DOMAIN="${NEEDS_VERSIONS_OUTPUTS_AWS_CLOUDFRONT_DISTRIBUTION_DOMAIN}"
          if [ -z "$DOMAIN" ] || [ "$DOMAIN" = "null" ]; then
            echo "No CloudFront distribution domain configured (aws.cloudfront_distribution_domain in versions.json); skipping invalidation"
            exit 0
          fi
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?DomainName=='$DOMAIN'].Id | [0]" \
            --output text 2>/dev/null || echo "")
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "WARNING: Could not find CloudFront distribution for domain $DOMAIN; skipping invalidation"
            echo "(IAM role may need cloudfront:ListDistributions permission)"
            exit 0
          fi
          NORM="${STEPS_PROJ_OUTPUTS_NORMALIZED}"
          # Invalidate both the trailing-slash directory paths (what pip and
          # browsers actually request) and the underlying index.html object
          # paths. CloudFront caches each request URI independently, so
          # invalidating only one form leaves the other stale.
          PATHS=(
            "/${SIMPLE_PREFIX}/"
            "/${SIMPLE_PREFIX}/index.html"
            "/${SIMPLE_PREFIX}/${NORM}/"
            "/${SIMPLE_PREFIX}/${NORM}/index.html"
          )
          echo "Invalidating distribution $DIST_ID paths: ${PATHS[*]}"
          if ! aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "${PATHS[@]}" \
            --query 'Invalidation.{Id:Id,Status:Status,CreateTime:CreateTime}' \
            --output table; then
            echo "WARNING: Failed to create CloudFront invalidation for distribution $DIST_ID; skipping invalidation"
            echo "(IAM role may need cloudfront:CreateInvalidation permission)"
            exit 0
          fi
        env:
          NEEDS_VERSIONS_OUTPUTS_AWS_CLOUDFRONT_DISTRIBUTION_DOMAIN: ${{ needs.versions.outputs.aws-cloudfront-distribution-domain }}
          STEPS_PROJ_OUTPUTS_NORMALIZED: ${{ steps.proj.outputs.normalized }}

  ##############################################################################
  # GPU VALIDATION: SMOKE TEST + UNIT TESTS
  ##############################################################################
  start-validation-runner:
    name: Start GPU EC2 runner for validation
    needs: [pr-flags, fvdb-build, versions]
    if: ${{ !cancelled() && needs.fvdb-build.result == 'success' && (needs.pr-flags.outputs.release_push == 'true' || needs.pr-flags.outputs.release == 'true' || inputs.run_validation == true) }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for AWS OIDC
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.versions.outputs.publish-matrix) }}
    steps:
      - name: Stagger job starts to avoid API rate limits
        run: |
          DELAY=$((RANDOM % 16))
          echo "Delaying start by ${DELAY} seconds for Python ${MATRIX_PYTHON_VERSION}"
          sleep $DELAY
        env:
          MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ needs.versions.outputs.aws-role }}
          aws-region: ${{ needs.versions.outputs.aws-region }}
      - name: Start EC2 GPU runner
        id: start-validation-runner
        uses: machulav/ec2-github-runner@343a1b2ae682e681c3cec9a235d882da17ff04ef # v2.6.1
        with:
          mode: start
          github-token: ${{ secrets.EC2_RUNNER_TOKEN }}
          ec2-image-id: ${{ needs.versions.outputs.aws-gpu-ami }}
          ec2-instance-type: g6.xlarge
          subnet-id: ${{ needs.versions.outputs.aws-subnet }}
          security-group-id: ${{ needs.versions.outputs.aws-security-group }}
          label: val-${{ matrix.python-version }}-pt${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}-${{ github.run_id }}
          aws-resource-tags: >
            [
              {"Key": "RunnerLabel", "Value": "val-${{ matrix.python-version }}-pt${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}-${{ github.run_id }}"},
              {"Key": "PythonVersion", "Value": "${{ matrix.python-version }}"},
              {"Key": "TorchVersion", "Value": "${{ matrix.torch-version }}"},
              {"Key": "CudaVersion", "Value": "${{ matrix.cuda-version }}"},
              {"Key": "GitHubRunId", "Value": "${{ github.run_id }}"}
            ]

  validate-smoke-test:
    name: Smoke test built wheel
    needs: [start-validation-runner, fvdb-build, pr-flags, versions]
    if: ${{ !cancelled() && needs.start-validation-runner.result == 'success' }}
    runs-on: val-${{ matrix.python-version }}-pt${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}-${{ github.run_id }}
    container:
      image: nvidia/cuda:${{ matrix.cuda-image-tag }}-base-rockylinux8
      env:
        PYTHONPATH: ""
      options: --rm
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.versions.outputs.publish-matrix) }}
    steps:
      - name: Install prerequisites
        run: dnf install -y git wget procps-ng findutils

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          version: "${{ needs.versions.outputs.uv-version }}"
          enable-cache: false

      - name: Set up Python
        run: |
          uv python install ${MATRIX_PYTHON_VERSION}
          uv venv
        env:
          MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Download wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: fvdb-publish-package-${{ matrix.python-version }}-torch${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}
          path: dist

      - name: Install wheel
        run: |
          CUDA_TAG="cu$(echo "${MATRIX_CUDA_VERSION}" | tr -d '.')"
          echo "torch==${NEEDS_VERSIONS_OUTPUTS_TORCH_FULL_VERSION}" > "${RUNNER_TEMP}/torch-constraints.txt"
          uv pip install --no-cache -c "${RUNNER_TEMP}/torch-constraints.txt" torch --extra-index-url https://download.pytorch.org/whl/${CUDA_TAG}
          uv pip install dist/fvdb_core-*.whl
        env:
          MATRIX_CUDA_VERSION: ${{ matrix.cuda-version }}
          NEEDS_VERSIONS_OUTPUTS_TORCH_FULL_VERSION: ${{ needs.versions.outputs.torch-full-version }}

      - name: Run smoke test
        run: |
          uv run python3 -c "
          import fvdb
          import torch
          print(f'fvdb version: {fvdb.__version__}')
          print(f'torch version: {torch.__version__}')
          print(f'CUDA available: {torch.cuda.is_available()}')
          assert torch.cuda.is_available(), 'CUDA not available'
          ijk = fvdb.JaggedTensor([torch.tensor([[0,0,0],[1,1,1],[2,2,2]], device='cuda')])
          grid = fvdb.GridBatch.from_ijk(ijk)
          print(f'GridBatch created: {grid.total_voxels} voxels on {grid.device}')
          assert grid.total_voxels == 3, f'Expected 3 voxels, got {grid.total_voxels}'
          print('Smoke test PASSED')
          "

  validate-unit-tests:
    name: Full unit tests on built wheel
    needs: [start-validation-runner, validate-smoke-test, pr-flags]
    if: ${{ !cancelled() && needs.validate-smoke-test.result == 'success' && (needs.pr-flags.outputs.release_push == 'true' || needs.pr-flags.outputs.release == 'true' || inputs.run_validation == true) }}
    # Run on the validation runner matching env/test_environment.yml (no matrix -- single job)
    runs-on: val-${{ needs.pr-flags.outputs.test_python_version }}-pt${{ needs.pr-flags.outputs.test_torch_version }}-cu${{ needs.pr-flags.outputs.test_cuda_version }}-${{ github.run_id }}
    container:
      image: nvidia/cuda:${{ needs.pr-flags.outputs.test_cuda_image_tag }}-base-rockylinux8
      env:
        PYTHONPATH: ""
      options: --rm
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Install prerequisites
        run: dnf install -y git wget procps-ng findutils

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch || github.ref }}
          persist-credentials: false

      - name: Set up fvdb_test Conda env
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          cache-environment: false
          post-cleanup: 'all'
          environment-name: fvdb_test
          environment-file: env/test_environment.yml

      - name: Download wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: fvdb-publish-package-${{ needs.pr-flags.outputs.test_python_version }}-torch${{ needs.pr-flags.outputs.test_torch_version }}-cu${{ needs.pr-flags.outputs.test_cuda_version }}
          path: dist

      - name: Install wheel
        run: |
          micromamba activate fvdb_test
          pip install dist/fvdb_core-*.whl

      - name: Run unit tests
        run: |
          micromamba activate fvdb_test
          NANOVDB_EDITOR_SPEC=$(python .github/scripts/get_viewer_dependency.py)
          pip install "$NANOVDB_EDITOR_SPEC"
          cd tests
          pytest -v unit

  stop-validation-runner:
    name: Stop GPU EC2 runner for validation
    needs:
      - start-validation-runner
      - validate-smoke-test
      - validate-unit-tests
      - versions
    runs-on: ubuntu-latest
    if: ${{ always() && needs.start-validation-runner.result != 'skipped' }}
    permissions:
      id-token: write  # Required for AWS OIDC
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.versions.outputs.publish-matrix) }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ needs.versions.outputs.aws-role }}
          aws-region: ${{ needs.versions.outputs.aws-region }}
      - name: Find EC2 instance ID by label
        id: find-instance
        run: |
          LABEL="val-${MATRIX_PYTHON_VERSION}-pt${MATRIX_TORCH_VERSION}-cu${MATRIX_CUDA_VERSION}-${{ github.run_id }}"
          echo "Looking for instance with RunnerLabel: $LABEL"

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:RunnerLabel,Values=$LABEL" "Name=instance-state-name,Values=running,pending,stopping,stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "ERROR: No instance found with RunnerLabel=$LABEL"
            echo "instance-id=" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "Found instance: $INSTANCE_ID"
            echo "instance-id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          fi
        env:
          MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}
          MATRIX_TORCH_VERSION: ${{ matrix.torch-version }}
          MATRIX_CUDA_VERSION: ${{ matrix.cuda-version }}
      - name: Stop EC2 runner
        if: steps.find-instance.outputs.instance-id != ''
        uses: machulav/ec2-github-runner@343a1b2ae682e681c3cec9a235d882da17ff04ef # v2.6.1
        with:
          mode: stop
          github-token: ${{ secrets.EC2_RUNNER_TOKEN }}
          label: val-${{ matrix.python-version }}-pt${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}-${{ github.run_id }}
          ec2-instance-id: ${{ steps.find-instance.outputs.instance-id }}

  fvdb-build-stop-runner:
    name: Stop CPU-only EC2 runner for build
    needs:
      - start-build-runner # required to get output from the start-build-runner job
      - fvdb-build # required to wait when the main job is done
      - versions
    runs-on: ubuntu-latest
    if: ${{ always() }} # required to stop the runner even if the error happened in the previous jobs
    permissions:
      id-token: write  # Required for AWS OIDC
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.versions.outputs.publish-matrix) }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ needs.versions.outputs.aws-role }}
          aws-region: ${{ needs.versions.outputs.aws-region }}
      - name: Find EC2 instance ID by label
        id: find-instance
        run: |
          LABEL="ec2-${MATRIX_PYTHON_VERSION}-pt${MATRIX_TORCH_VERSION}-cu${MATRIX_CUDA_VERSION}-${{ github.run_id }}"
          echo "Looking for instance with RunnerLabel: $LABEL"

          # Query by the custom RunnerLabel tag we set during instance creation
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:RunnerLabel,Values=$LABEL" "Name=instance-state-name,Values=running,pending,stopping,stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "ERROR: No instance found with RunnerLabel=$LABEL"
            echo "instance-id=" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "Found instance: $INSTANCE_ID"
            echo "instance-id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          fi
        env:
          MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}
          MATRIX_TORCH_VERSION: ${{ matrix.torch-version }}
          MATRIX_CUDA_VERSION: ${{ matrix.cuda-version }}
      - name: Stop EC2 runner
        if: steps.find-instance.outputs.instance-id != ''
        uses: machulav/ec2-github-runner@343a1b2ae682e681c3cec9a235d882da17ff04ef # v2.6.1
        with:
          mode: stop
          github-token: ${{ secrets.EC2_RUNNER_TOKEN }}
          label: ec2-${{ matrix.python-version }}-pt${{ matrix.torch-version }}-cu${{ matrix.cuda-version }}-${{ github.run_id }}
          ec2-instance-id: ${{ steps.find-instance.outputs.instance-id }}
