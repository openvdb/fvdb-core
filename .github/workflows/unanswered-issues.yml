name: Unanswered External Issues Report

on:
  schedule:
    - cron: "0 18 * * 1"  # 18:00 UTC = 10:00 AM Pacific
  workflow_dispatch:

permissions:
  contents: read

# ISSUES_PAT must be a classic PAT with read:org + repo scopes (or a
# fine-grained token with Organization > Members > Read and Issues >
# Read-only for the repos listed in the script).  The default GITHUB_TOKEN
# cannot resolve team membership, so author_association alone is unreliable.

jobs:
  report:
    if: github.repository == 'openvdb/fvdb-core'
    runs-on: ubuntu-latest
    steps:
      - name: Download report script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/openvdb/fvdb-core/contents/devtools/unanswered_external_issues.py \
            --jq .content | base64 -d > unanswered_external_issues.py

      - name: Verify ISSUES_PAT can read team members
        env:
          GH_TOKEN: ${{ secrets.ISSUES_PAT }}
        run: |
          gh api orgs/openvdb/teams/fvdb-dev/members --jq '[.[].login] | length | tostring + " team members found"'

      - name: Generate report (dry run)
        env:
          GH_TOKEN: ${{ secrets.ISSUES_PAT }}
        run: |
          python3 unanswered_external_issues.py --format slack | tee report.txt

