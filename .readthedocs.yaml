version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      # Generate fvdb/version.py if absent (normally created by CMake).
      - test -f fvdb/version.py || python -c "import tomllib,pathlib;v=tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'];pathlib.Path('fvdb/version.py').write_text(pathlib.Path('fvdb/version.py.in').read_text().replace('@SKBUILD_PROJECT_VERSION@',v).replace('@FVDB_GIT_SHA@','unknown'))"

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements.txt
